name: Docker Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/openphotos-ca/openphotos

jobs:
  docker-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          flavor: |
            latest=auto
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build smoke-test image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          load: true
          pull: true
          provenance: false
          tags: openphotos:smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test container
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/openphotos-smoke-data
          docker run -d --name openphotos-smoke \
            -p 3003:3003 \
            -v /tmp/openphotos-smoke-data:/data \
            openphotos:smoke

          for attempt in $(seq 1 90); do
            if curl -fsS http://127.0.0.1:3003/ping >/dev/null; then
              break
            fi
            if [[ "$attempt" -eq 90 ]]; then
              docker logs openphotos-smoke
              exit 1
            fi
            sleep 2
          done

          curl -fsS http://127.0.0.1:3003/ >/dev/null
          curl -fsSI -X OPTIONS \
            http://127.0.0.1:3003/files/ \
            -H 'Tus-Resumable: 1.0.0' >/dev/null

      - name: Print smoke-test logs
        if: always()
        run: docker logs openphotos-smoke || true

      - name: Clean up smoke-test container
        if: always()
        run: docker rm -f openphotos-smoke || true

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          pull: true
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
